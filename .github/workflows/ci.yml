name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write # to cut a release from main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Test and build
        run: ./gradlew test assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk

      # A push to main whose versionName has no tag yet is a release. Bump versionName in
      # app/build.gradle.kts and the APK shows up on the releases page; leave it alone and this
      # step does nothing.
      - name: Release, if the version is new
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          if gh release view "v$version" >/dev/null 2>&1; then
            echo "v$version is already released, nothing to do."
            exit 0
          fi
          gh release create "v$version" \
            --title "v$version" \
            --generate-notes \
            app/build/outputs/apk/release/app-release.apk
